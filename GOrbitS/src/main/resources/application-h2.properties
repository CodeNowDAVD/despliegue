# -----------------------------------------------------------------------------
# Desarrollo local (Mac): H2 en archivo. Datos demo vía Seed* al primer arranque.
# No requiere MySQL instalado.
#
#   ./mvnw spring-boot:run
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2,dev   # + SQL en consola
#
# Resetear datos: borrar carpeta GOrbitS/data/ y volver a arrancar.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/gorbits;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
