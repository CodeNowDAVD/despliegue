spring.application.name=GOrbitS
# Mac / desarrollo local: H2 en archivo (./data/gorbits). Servidor: perfil mysql (ver README).
spring.profiles.default=h2

server.port=8080

spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:dev-only-secret-key-change-in-prod-min-32-chars!}
app.security.jwt.expiration-ms=86400000

# Plantilla del mensaje para el cliente tras registrar un pago (placeholders: {cliente}, {campana}, {guiaId}, {cuotaSeq}, {abono}, {fechaAbono}, {saldoCuota}, {saldoGuia}, {moneda})
# app.billing.client-payment-message.currency-symbol=S/
# app.billing.client-payment-message.template=Tu texto...

management.endpoints.web.exposure.include=health,info

# /actuator/info incluye propiedades info.*
management.info.env.enabled=true

# OpenAPI / Swagger UI (documentación en vivo para reuniones e integración)
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false
springdoc.swagger-ui.display-request-duration=true

# Texto mostrado en GET /actuator/info
info.app.name=GOrbitS
info.app.description=API MVP biblioteca / proveedor
