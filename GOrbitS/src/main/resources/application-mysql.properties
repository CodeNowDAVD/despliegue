# -----------------------------------------------------------------------------
# Perfil por defecto (igual que el JAR en servidor con mysql,prod).
# Importá antes database/migrations/*.sql (o db/mysql/gorbits_seed.sql legacy).
# No se ejecutan Seed* Java: la BD es la única fuente de datos.
#
# Local (misma BD que producción en tu máquina):
#   ./mvnw spring-boot:run
#
# Apuntar al MySQL del servidor remoto:
#   MYSQL_URL=jdbc:mariadb://HOST:3306/gorbits MYSQL_USER=... MYSQL_PASSWORD=... ./mvnw spring-boot:run
#
# Producción:
#   java -jar GOrbitS.jar --spring.profiles.active=mysql,prod
# -----------------------------------------------------------------------------
# Driver MariaDB: evita errores de metadatos (p.ej. UNKNOWN COLUMN 'RESERVED') con
# mysql-connector-j + MariaDB 10.6+ / 11+ / 12+ en Android/Termux.

spring.datasource.url=${MYSQL_URL:jdbc:mariadb://127.0.0.1:3306/gorbits?characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# El esquema lo carga el .sql importado (no Hibernate update en prod).
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
