# Perfil tc: pruebas de capa @DataJpaTest con Testcontainers (MariaDB en Docker).
# URL, usuario y contraseña se inyectan en runtime vía @DynamicPropertySource.
# No usar credenciales ni hosts de producción.

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.security.jwt.secret=tc-test-jwt-secret-key-at-least-32-chars-long!
