# Sesión 08 — CI en GitHub (complemento a Jenkins del docente).
name: GOrbitS CI

on:
  push:
    branches: [main, master]
    paths:
      - 'GOrbitS/**'
      - 'Jenkinsfile'
      - '.github/workflows/gorbits-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'GOrbitS/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GOrbitS

    steps:
      - uses: actions/checkout@v4

      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build y tests (JaCoCo)
        run: ./mvnw -B clean verify

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: GOrbitS/target/site/jacoco/
          retention-days: 14

      - name: Publicar JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gorbits-jar
          path: GOrbitS/target/GOrbitS-0.0.1-SNAPSHOT.jar
          retention-days: 7

  # Opcional: añade secret SONAR_TOKEN en el repo para activar Sonar en GitHub.
  sonar:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && vars.SONAR_ENABLED == 'true'
    defaults:
      run:
        working-directory: GOrbitS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B clean verify
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}"
